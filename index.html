<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GeoSync GPS — Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-700: #102a5a;
      --blue-600: #1a3f80;
      --blue-500: #1f4faa;
      --blue-400: #2e6ad4;
      --white:    #ffffff;
      --gray-100: #f4f6f9;
      --gray-200: #dde3ec;
      --gray-400: #8e9ab0;
      --text-main: #0d1b2e;
      --text-sub:  #5a6a80;
      --accent:    #e8b84b;
    }

    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: #080c14; }

    .page { min-height: 100vh; display: flex; align-items: stretch; }

    /* ── LEFT PANEL ── */
    .left {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 3rem 3.5rem;
      min-height: 340px;
    }

    .scene-bg { position: absolute; inset: 0; width: 100%; height: 100%; }

    .left-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(165deg, rgba(6,10,18,0.10) 0%, rgba(6,10,18,0.30) 50%, rgba(6,10,18,0.82) 100%);
    }

    .left-texture {
      position: absolute; inset: 0;
      background-image: repeating-linear-gradient(-45deg, transparent, transparent 20px, rgba(255,255,255,0.011) 20px, rgba(255,255,255,0.011) 21px);
    }

    .left-content { position: relative; z-index: 4; }

    #globe-canvas {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
      pointer-events: none;
      opacity: 0.90;
    }

    @media (max-width: 820px) {
      #globe-canvas { opacity: 0.70; width: 320px !important; height: 320px !important; }
    }

    .live-badge {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(34,197,94,0.11);
      border: 1px solid rgba(34,197,94,0.36);
      border-radius: 4px; padding: 5px 12px;
      font-size: 10px; font-weight: 600; color: #4ade80;
      letter-spacing: 2px; margin-bottom: 1.2rem;
    }

    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #4ade80; animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    .left-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 700; color: #fff;
      line-height: 1.1; margin-bottom: 0.9rem;
    }

    .left-title span { color: #4ade80; }

    .left-desc {
      font-size: 13px; color: rgba(255,255,255,0.46);
      line-height: 1.65; max-width: 320px;
    }

    /* ── RIGHT PANEL ── */
    .right {
      width: 400px; flex-shrink: 0;
      background: var(--white);
      display: flex; flex-direction: column; justify-content: center;
      padding: 3rem 2.5rem; position: relative;
    }

    .right::before {
      content: ''; position: absolute;
      left: 0; top: 10%; bottom: 10%; width: 3px;
      background: linear-gradient(180deg, transparent, var(--blue-400), transparent);
      border-radius: 2px;
    }

    .logo { display: flex; align-items: center; gap: 11px; margin-bottom: 2.2rem; }

    .logo-icon {
      width: 40px; height: 40px; background: var(--blue-700);
      border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }

    .logo-icon svg { width: 22px; height: 22px; }
    .logo-text-wrap { display: flex; flex-direction: column; }

    .logo-name {
      font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700;
      color: var(--text-main); letter-spacing: 0.5px; line-height: 1;
    }

    .logo-version { font-size: 9px; font-weight: 500; color: var(--gray-400); letter-spacing: 1.5px; margin-top: 3px; }

    .sep { width: 100%; height: 1px; background: var(--gray-200); margin-bottom: 2rem; }

    .form-head { margin-bottom: 1.6rem; }

    .form-title { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; color: var(--text-main); margin-bottom: 4px; }

    .form-sub { font-size: 12px; color: var(--text-sub); }

    .field { margin-bottom: 1rem; }

    .field > label { display: block; font-size: 10px; font-weight: 600; color: var(--gray-400); letter-spacing: 1.2px; margin-bottom: 6px; }

    .input-wrap { position: relative; }

    .input-wrap .ico {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      width: 15px; height: 15px; color: var(--gray-400); pointer-events: none;
    }

    .input-wrap input {
      width: 100%; background: var(--gray-100); border: 1px solid var(--gray-200);
      border-radius: 7px; color: var(--text-main); font-family: 'DM Sans', sans-serif;
      font-size: 13px; padding: 11px 12px 11px 38px; outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    .input-wrap input::placeholder { color: #b8c2d0; }

    .input-wrap input:focus { background: var(--white); border-color: var(--blue-400); box-shadow: 0 0 0 3px rgba(46,106,212,0.1); }

    .row-opts { display: flex; justify-content: space-between; align-items: center; margin: 0.3rem 0 1.4rem; flex-wrap: wrap; gap: 8px; }

    .check-row { display: flex; align-items: center; gap: 7px; }

    .check-row input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--blue-500); cursor: pointer; padding: 0; }

    .check-row label { font-size: 12px; color: var(--text-sub); cursor: pointer; }

    .forgot { font-size: 12px; color: var(--blue-400); text-decoration: none; font-weight: 500; }
    .forgot:hover { text-decoration: underline; }

    .btn {
      width: 100%; background: var(--blue-700); color: var(--white);
      border: none; border-radius: 7px; font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 600; letter-spacing: 0.4px; padding: 12px 16px;
      cursor: pointer; transition: background 0.2s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    .btn svg { width: 15px; height: 15px; flex-shrink: 0; }
    .btn:hover { background: var(--blue-600); }
    .btn:active { transform: scale(0.98); }

    .form-footer {
      margin-top: 1.6rem; padding-top: 1.2rem;
      border-top: 1px solid var(--gray-200);
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }

    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; animation: blink 2.5s ease-in-out infinite; }

    .status-txt { font-size: 10px; color: var(--gray-400); letter-spacing: 0.4px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 820px) {
      .page { flex-direction: column; min-height: 100vh; }
      .left { flex: none; min-height: 280px; padding: 2rem; justify-content: flex-end; }
      .left-title { font-size: clamp(24px, 5vw, 34px); }
      .left-desc { display: none; }
      .right { width: 100%; flex: 1; padding: 2.5rem 2rem; justify-content: flex-start; }
      .right::before { display: none; }
    }

    @media (max-width: 480px) {
      .left { min-height: 220px; padding: 1.5rem; }
      .right { padding: 2rem 1.25rem; }
      .logo { margin-bottom: 1.5rem; }
      .sep { margin-bottom: 1.5rem; }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- ── LEFT PANEL ── -->
  <div class="left">
    <svg class="scene-bg" viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">

      <!-- Dark background only — globe rendered on canvas -->
      <rect width="900" height="700" fill="#060a10"/>
    </svg>


    <div class="left-overlay"></div>
    <div class="left-texture"></div>
    <canvas id="globe-canvas" width="520" height="520"></canvas>

    <div class="left-content">
      <div class="live-badge">
        <div class="live-dot"></div>
        SISTEMA EN LÍNEA
      </div>
      <h1 class="left-title">Rastreo Logístico<br>en <span>Tiempo Real</span></h1>
      <p class="left-desc">Plataforma integral de seguimiento GPS para flotas de transporte pesado, logística y distribución.</p>
    </div>
  </div>

  <!-- ── RIGHT FORM PANEL ── -->
  <div class="right">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="#4f8ef7" opacity="0.30"/>
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="none" stroke="#7eb3fa" stroke-width="1.5"/>
          <circle cx="12" cy="9" r="3" fill="#7eb3fa"/>
          <circle cx="12" cy="9" r="1.4" fill="white"/>
        </svg>
      </div>
      <div class="logo-text-wrap">
        <span class="logo-name">GeoSync</span>
        <span class="logo-version">PLATAFORMA GPS · v4.2</span>
      </div>
    </div>

    <div class="sep"></div>

    <div class="form-head">
      <p class="form-title">Acceso al sistema</p>
      <p class="form-sub">Ingresa tus credenciales para continuar</p>
    </div>

    <div class="field">
      <label>CORREO / USUARIO</label>
      <div class="input-wrap">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        <input type="text" placeholder="usuario@empresa.mx" autocomplete="username"/>
      </div>
    </div>

    <div class="field">
      <label>CONTRASEÑA</label>
      <div class="input-wrap">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <rect x="5" y="11" width="14" height="10" rx="2"/>
          <path d="M8 11V7a4 4 0 018 0v4"/>
        </svg>
        <input type="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
    </div>

    <div class="row-opts">
      <div class="check-row">
        <input type="checkbox" id="remember"/>
        <label for="remember">Mantener sesión activa</label>
      </div>
      <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
    </div>

    <button class="btn" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      Iniciar sesión
    </button>

    <div class="form-footer">
      <div class="status-dot"></div>
      <span class="status-txt">Conexión segura · TLS 1.3</span>
    </div>
  </div>

</div>
</body>
<script>
(function() {
  const canvas = document.getElementById('globe-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  const R = 220;

  // Mouse tracking relative to canvas
  let mouseX = -9999, mouseY = -9999;
  let hoverIntensity = 0; // 0 = normal, 1 = fully lit
  let isHovering = false;

  const leftPanel = canvas.closest('.left') || canvas.parentElement;
  leftPanel.addEventListener('mouseenter', () => { isHovering = true; });
  leftPanel.addEventListener('mouseleave', () => { isHovering = false; mouseX = -9999; mouseY = -9999; });
  leftPanel.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;
  });

  // Fibonacci lattice points on sphere
  const N = 200;
  const points = [];
  const golden = Math.PI * (3 - Math.sqrt(5));
  for (let i = 0; i < N; i++) {
    const y = 1 - (i / (N - 1)) * 2;
    const r = Math.sqrt(1 - y * y);
    const theta = golden * i;
    points.push({
      x: Math.cos(theta) * r,
      y,
      z: Math.sin(theta) * r,
      pulse: Math.random() * Math.PI * 2,
      size: 1.4 + Math.random() * 1.8,
      bright: Math.random() > 0.75
    });
  }

  const CONNECT_DIST = 0.52;
  let rotY = 0;
  const rotX = 0.18;
  let frame = 0;

  function project(p) {
    const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
    const x1 = p.x * cosY - p.z * sinY;
    const z1 = p.x * sinY + p.z * cosY;
    const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
    const y2 = p.y * cosX - z1 * sinX;
    const z2 = p.y * sinX + z1 * cosX;
    return { sx: cx + x1 * R, sy: cy + y2 * R, z: z2 };
  }

  function lerp(a, b, t) { return a + (b - a) * t; }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  // Proximity boost: how close is projected point to mouse cursor
  function mouseBoost(sx, sy) {
    const dx = sx - mouseX, dy = sy - mouseY;
    const d = Math.sqrt(dx * dx + dy * dy);
    return clamp(1 - d / 160, 0, 1) * hoverIntensity;
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    rotY += 0.0028;
    frame++;

    // Smoothly transition hover intensity
    const targetIntensity = isHovering ? 1 : 0;
    hoverIntensity += (targetIntensity - hoverIntensity) * 0.04;

    const proj = points.map((p, i) => {
      const pr = project(p);
      return { ...pr, idx: i, p };
    });

    proj.sort((a, b) => a.z - b.z);

    // ── DRAW CONNECTIONS ──
    for (let i = 0; i < proj.length; i++) {
      const a = proj[i];
      for (let j = i + 1; j < proj.length; j++) {
        const b = proj[j];
        const pa = a.p, pb = b.p;
        const dx = pa.x - pb.x, dy = pa.y - pb.y, dz = pa.z - pb.z;
        const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
        if (dist > CONNECT_DIST) continue;

        const vis = ((a.z + 1) / 2) * ((b.z + 1) / 2);
        if (vis < 0.04) continue;

        const boost = (mouseBoost(a.sx, a.sy) + mouseBoost(b.sx, b.sy)) / 2;
        const baseAlpha = (1 - dist / CONNECT_DIST) * vis * 0.55;
        const alpha = clamp(baseAlpha + boost * 0.55, 0, 1);

        const t = (a.z + b.z) / 2;
        // Green color ramp: dark green → bright lime
        const rC  = Math.round(lerp(5,  80,  (t + 1) / 2));
        const gC  = Math.round(lerp(80, 240, (t + 1) / 2));
        const bC  = Math.round(lerp(30, 100, (t + 1) / 2));

        // Hover: shift toward bright white-green
        const rH  = Math.round(lerp(rC, 180, boost));
        const gH  = Math.round(lerp(gC, 255, boost));
        const bH  = Math.round(lerp(bC, 180, boost));

        ctx.beginPath();
        ctx.moveTo(a.sx, a.sy);
        ctx.lineTo(b.sx, b.sy);
        ctx.strokeStyle = `rgba(${rH},${gH},${bH},${alpha.toFixed(3)})`;
        ctx.lineWidth = boost > 0.1 ? 0.9 : 0.6;
        ctx.stroke();
      }
    }

    // ── DRAW NODES ──
    for (const pt of proj) {
      const vis = (pt.z + 1) / 2;
      if (vis < 0.05) continue;

      const pulse = Math.sin(frame * 0.04 + pt.p.pulse) * 0.5 + 0.5;
      const t = (pt.z + 1) / 2;
      const boost = mouseBoost(pt.sx, pt.sy);

      // Base green ramp
      let rC  = Math.round(lerp(10,  60,  t));
      let gC  = Math.round(lerp(120, 230, t));
      let bC  = Math.round(lerp(40,  110, t));

      // Hover: brighten to electric lime
      const rF = Math.round(lerp(rC, 200, boost));
      const gF = Math.round(lerp(gC, 255, boost));
      const bF = Math.round(lerp(bC, 160, boost));

      const baseSize = pt.p.size * (0.5 + vis * 0.6) * (1 + boost * 0.8);

      if (pt.p.bright || boost > 0.3) {
        const glowAlpha = vis * (0.25 + pulse * 0.20 + boost * 0.45);
        const glowR = baseSize * (3.5 + boost * 3);
        const grd = ctx.createRadialGradient(pt.sx, pt.sy, 0, pt.sx, pt.sy, glowR);
        grd.addColorStop(0, `rgba(${rF},${gF},${bF},${clamp(glowAlpha, 0, 1).toFixed(3)})`);
        grd.addColorStop(1, `rgba(${rF},${gF},${bF},0)`);
        ctx.beginPath();
        ctx.arc(pt.sx, pt.sy, glowR, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(pt.sx, pt.sy, baseSize * (0.9 + pulse * 0.3), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${rF},${gF},${bF},${clamp(vis * 0.95 + boost * 0.05, 0, 1).toFixed(3)})`;
        ctx.fill();
      } else {
        ctx.beginPath();
        ctx.arc(pt.sx, pt.sy, baseSize * 0.75, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${rF},${gF},${bF},${clamp(vis * 0.65, 0, 1).toFixed(3)})`;
        ctx.fill();
      }
    }

    // Equatorial ring — green tint
    ctx.beginPath();
    ctx.ellipse(cx, cy, R, R * Math.abs(Math.sin(rotX)), 0, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(50,200,80,${(0.05 + hoverIntensity * 0.08).toFixed(3)})`;
    ctx.lineWidth = 1;
    ctx.stroke();

    requestAnimationFrame(draw);
  }

  draw();
})();
</script>
</html>
